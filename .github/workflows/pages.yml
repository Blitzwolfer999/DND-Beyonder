name: Deploy Arcana Forge to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Configure account sync
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const config = {
            supabaseUrl: process.env.SUPABASE_URL || "",
            supabasePublishableKey: process.env.SUPABASE_PUBLISHABLE_KEY || ""
          };
          fs.writeFileSync("cloud-config.js", `window.ARCANA_CLOUD_CONFIG = ${JSON.stringify(config, null, 2)};\n`);
          NODE
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
